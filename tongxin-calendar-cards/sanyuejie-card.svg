<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#eef4ff"/>
  <rect x="42" y="42" width="996" height="636" rx="34" fill="#fff" stroke="#6784c8" stroke-width="3"/>
  <path d="M76 42h928a34 34 0 0 1 34 34v74H42V76a34 34 0 0 1 34-34z" fill="#6784c8"/>
  <text x="80" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="38" fill="#fff">今日同心日历</text>
  <text x="620" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#fff">5月1日｜农历三月十五</text>
  <text x="80" y="255" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="74" font-weight="700" fill="#283768">白族三月街</text>
  <text x="84" y="318" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" fill="#6784c8">白族｜集市贸易 歌舞赛马 扎染三道茶</text>
  <rect x="80" y="350" width="920" height="118" rx="18" fill="#eef4ff" opacity=".72" stroke="#e8e8e8"/>
  <text x="110" y="392" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#283768">节日速览</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#222"><tspan x="245" y="392">苍山脚下，人们赶集、赛马、唱歌，白族扎染、三道茶和集市生</tspan><tspan x="245" y="432">活构成鲜活节日场景。</tspan></text>
  <rect x="80" y="500" width="920" height="86" rx="18" fill="#fafafa" stroke="#e8e8e8"/>
  <text x="110" y="553" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="26" fill="#283768">共同体连接</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="27" fill="#333"><tspan x="300" y="545">三月街把滇西各族群众、商旅和游客聚在一起，延续互通</tspan><tspan x="300" y="581">有无的历史传统。</tspan></text>
  <text x="84" y="625" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#555">配图方向：扎染纹样、三道茶、集市烟火、赛马</text>
  <text x="84" y="666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="26" fill="#6784c8">回复“详细 / 短视频 / 公众号”继续生成</text>
  <text x="860" y="666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" fill="#888">中南民族大学</text>
</svg>