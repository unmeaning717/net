<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#eef4ff"/>
  <rect x="42" y="42" width="996" height="636" rx="34" fill="#fff" stroke="#6784c8" stroke-width="3"/>
  <path d="M76 42h928a34 34 0 0 1 34 34v74H42V76a34 34 0 0 1 34-34z" fill="#6784c8"/>
  <text x="80" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="40" fill="#fff">今日同心日历</text>
  <text x="650" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#fff">5月1日｜农历三月十五</text>
  <text x="80" y="265" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="90" font-weight="700" fill="#283768">白族三月街</text>
  <text x="84" y="338" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="36" fill="#6784c8">白族｜集市贸易 歌舞赛马 扎染三道茶</text>
  <rect x="80" y="378" width="920" height="112" rx="20" fill="#eef4ff" opacity=".75" stroke="#e8e8e8"/>
  <text x="112" y="425" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" fill="#283768">节日速览</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="34" fill="#222"><tspan x="270" y="425">苍山脚下赶集、赛马、唱歌，扎染与三道茶构成鲜活</tspan><tspan x="270" y="469">节日场景。</tspan></text>
  <rect x="80" y="520" width="920" height="82" rx="20" fill="#fafafa" stroke="#e8e8e8"/>
  <text x="112" y="571" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#283768">共同体连接</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="31" fill="#333"><tspan x="320" y="569">三月街让各族群众、商旅和游客在交流中走近彼</tspan><tspan x="320" y="607">此。</tspan></text>
  <text x="84" y="640" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#555">配图方向：扎染纹样、三道茶、集市烟火、赛马</text>
  <text x="84" y="676" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#6784c8">回复“详细 / 短视频 / 公众号”继续生成</text>
  <text x="860" y="666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" fill="#888">中南民族大学</text>
</svg>