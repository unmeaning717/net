<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#ffeede"/>
  <rect x="42" y="42" width="996" height="636" rx="34" fill="#fff" stroke="#e86e43" stroke-width="3"/>
  <path d="M76 42h928a34 34 0 0 1 34 34v74H42V76a34 34 0 0 1 34-34z" fill="#e86e43"/>
  <text x="80" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="38" fill="#fff">今日同心日历</text>
  <text x="620" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#fff">农历六月二十四｜2026年8月6日</text>
  <text x="80" y="255" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="74" font-weight="700" fill="#692a14">火把节</text>
  <text x="84" y="318" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" fill="#e86e43">彝族｜火文化 丰收祈愿 歌舞体育</text>
  <rect x="80" y="350" width="920" height="118" rx="18" fill="#ffeede" opacity=".72" stroke="#e8e8e8"/>
  <text x="110" y="392" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#692a14">节日速览</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#222"><tspan x="245" y="392">人们点燃火把、围火起舞，寄托驱害祈丰、团圆欢庆的愿望。</tspan></text>
  <rect x="80" y="500" width="920" height="86" rx="18" fill="#fafafa" stroke="#e8e8e8"/>
  <text x="110" y="553" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="26" fill="#692a14">共同体连接</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="27" fill="#333"><tspan x="300" y="545">火把节连接白族、纳西族、拉祜族等西南民族的共享节庆</tspan><tspan x="300" y="581">经验。</tspan></text>
  <text x="84" y="625" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#555">配图方向：火把、节日盛装、歌舞圆圈、地方美食</text>
  <text x="84" y="666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="26" fill="#e86e43">回复“详细 / 短视频 / 公众号”继续生成</text>
  <text x="860" y="666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" fill="#888">中南民族大学</text>
</svg>