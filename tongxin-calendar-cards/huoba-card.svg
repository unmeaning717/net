  <text x="84" y="338" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="36" fill="#e86e43">彝族｜火文化 丰收祈愿 歌舞体育</text>
  <rect x="80" y="378" width="920" height="112" rx="20" fill="#ffeede" opacity=".75" stroke="#e8e8e8"/>
  <text x="112" y="425" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" fill="#692a14">节日速览</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="34" fill="#222"><tspan x="270" y="425">点燃火把、围火起舞，寄托丰收与团圆愿望。</tspan></text>
  <rect x="80" y="520" width="920" height="82" rx="20" fill="#fafafa" stroke="#e8e8e8"/>
  <text x="112" y="571" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#692a14">共同体连接</text>
