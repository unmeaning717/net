  <text x="84" y="640" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#555">配图方向：火把、节日盛装、歌舞圆圈、地方美食</text>
  <text x="84" y="676" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#e86e43">回复“详细 / 短视频 / 公众号”继续生成</text>
  <text x="860" y="666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" fill="#888">中南民族大学</text>
