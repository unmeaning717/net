<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#f5f5f5"/>
  <rect x="42" y="42" width="996" height="636" rx="34" fill="#fff" stroke="#8791a0" stroke-width="3"/>
  <path d="M76 42h928a34 34 0 0 1 34 34v74H42V76a34 34 0 0 1 34-34z" fill="#8791a0"/>
  <text x="80" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="40" fill="#fff">今日同心日历</text>
  <text x="650" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#fff">未收录日期</text>
  <text x="80" y="265" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="90" font-weight="700" fill="#343d49">暂无明确记录</text>
  <text x="84" y="338" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="36" fill="#8791a0">知识库未命中｜避免误用未核验资料</text>
  <rect x="80" y="378" width="920" height="112" rx="20" fill="#f5f5f5" opacity=".75" stroke="#e8e8e8"/>
  <text x="112" y="425" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" fill="#343d49">节日速览</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="34" fill="#222"><tspan x="270" y="425">当前知识库暂无该日期对应的明确民族节日记录。</tspan></text>
  <rect x="80" y="520" width="920" height="82" rx="20" fill="#fafafa" stroke="#e8e8e8"/>
  <text x="112" y="571" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#343d49">共同体连接</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="31" fill="#333"><tspan x="320" y="569">准确了解各民族文化，是共同守护共有精神家园</tspan><tspan x="320" y="607">的基础。</tspan></text>
  <text x="84" y="640" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#555">配图方向：建议改用已录入主题生成卡片</text>
  <text x="84" y="676" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#8791a0">回复“详细 / 短视频 / 公众号”继续生成</text>
  <text x="860" y="666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" fill="#888">中南民族大学</text>
</svg>