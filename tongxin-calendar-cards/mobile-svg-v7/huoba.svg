<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480"><defs><linearGradient id="top" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#000" stop-opacity="0.58"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient><linearGradient id="bottom" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.86"/></linearGradient><style>text{font-family:&quot;Microsoft YaHei&quot;,&quot;Noto Sans CJK SC&quot;,Arial,sans-serif}.top{font-size:30px;font-weight:800;fill:#fff;paint-order:stroke;stroke:rgba(0,0,0,.45);stroke-width:4px}.date{font-size:24px;font-weight:800;fill:#263044}.tag{font-size:18px;font-weight:800;fill:#3a3012}.title{font-size:58px;font-weight:900;fill:#fff;paint-order:stroke;stroke:rgba(0,0,0,.55);stroke-width:5px}.desc{font-size:20px;fill:#fff;paint-order:stroke;stroke:rgba(0,0,0,.45);stroke-width:3px}</style></defs><image href="https://raw.githubusercontent.com/unmeaning717/net/main/tongxin-calendar-cards/mobile/huoba.jpg?v=4" width="720" height="480" preserveAspectRatio="xMidYMid slice"/><rect width="720" height="125" fill="url(#top)"/><rect y="220" width="720" height="260" fill="url(#bottom)"/><text class="top" x="34" y="60">今日同心日历</text><rect x="500" y="26" width="186" height="44" rx="22" fill="rgba(255,255,255,.92)"/><text class="date" x="593" y="56" text-anchor="middle">农历六月二十四</text><line x1="36" y1="272" x2="144" y2="272" stroke="rgba(255,255,255,.75)" stroke-width="2"/><rect x="38" y="286" width="174" height="38" rx="19" fill="rgba(255,221,100,.9)"/><text class="tag" x="125" y="312" text-anchor="middle">彝族等西南民族</text><text class="title" x="36" y="392">火把节</text><text class="desc" x="39" y="462">火光照亮山乡，也点亮共同的节日记忆。</text></svg>