<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#f2f9e6"/>
  <rect x="42" y="42" width="996" height="636" rx="34" fill="#fff" stroke="#68a25b" stroke-width="3"/>
  <path d="M76 42h928a34 34 0 0 1 34 34v74H42V76a34 34 0 0 1 34-34z" fill="#68a25b"/>
  <text x="80" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="40" fill="#fff">今日同心日历</text>
  <text x="650" y="112" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#fff">农历三月三｜2026年4月19日</text>
  <text x="80" y="265" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="90" font-weight="700" fill="#285431">三月三主题</text>
  <text x="84" y="338" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="36" fill="#68a25b">壮族 / 水族｜歌圩 山歌 铜鼓 水书</text>
  <rect x="80" y="378" width="920" height="112" rx="20" fill="#f2f9e6" opacity=".75" stroke="#e8e8e8"/>
  <text x="112" y="425" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" fill="#285431">节日速览</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="34" fill="#222"><tspan x="270" y="425">以山歌会友，以歌传情，歌圩中有对唱、绣球和美食</tspan><tspan x="270" y="469">展示。</tspan></text>
  <rect x="80" y="520" width="920" height="82" rx="20" fill="#fafafa" stroke="#e8e8e8"/>
  <text x="112" y="571" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#285431">共同体连接</text>
  <text font-family="Microsoft YaHei, SimHei, sans-serif" font-size="31" fill="#333"><tspan x="320" y="569">三月三以歌为桥，呈现中华文化的多样一体。</tspan></text>
  <text x="84" y="640" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="30" fill="#555">配图方向：五色糯米饭、绣球、铜鼓纹样、民族服饰</text>
  <text x="84" y="676" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" fill="#68a25b">回复“详细 / 短视频 / 公众号”继续生成</text>
  <text x="860" y="666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" fill="#888">中南民族大学</text>
